name: Typos AI
description: Run typos.ai checks

inputs:
  key:
    required: true

  run:
    required: false
    default: "1"

runs:
  using: composite

  steps:
    - uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - shell: bash
      run: bun i palabra typos.ai -g --no-save

    - shell: bash
      run: palabra i typos

    - shell: bash
      run: typos.ai
      env:
        TYPOS_AI_KEY: ${{ inputs.key }}
        TYPOS_AI_RUN: ${{ inputs.run }}
